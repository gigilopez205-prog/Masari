<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masari Ultimate Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #020c1b; --bg-main: #0a192f; --bg-card: #112240;
            --blue: #3b82f6; --white: #e2e8f0; --gray: #94a3b8;
            --green: #10b981; --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg-main); color: var(--white); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* SIDEBAR */
        nav { width: 250px; background: var(--bg-dark); padding: 30px 20px; border-right: 1px solid #233554; position: fixed; height: 100vh; z-index: 100; }
        .logo { font-size: 26px; font-weight: 800; color: var(--blue); margin-bottom: 40px; display: flex; align-items: center; gap: 12px; }
        .logo-icon { background: var(--blue); color: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 22px; }
        .nav-btn { width: 100%; padding: 15px; background: none; border: none; color: var(--gray); text-align: left; cursor: pointer; font-size: 16px; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background: rgba(59, 130, 246, 0.1); color: var(--blue); }
        .nav-btn.active { border-left: 4px solid var(--blue); font-weight: bold; }

        /* CONTENT */
        main { margin-left: 250px; padding: 40px; width: calc(100% - 250px); }
        .page { display: none; max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--bg-card); padding: 25px; border-radius: 18px; border: 1px solid #233554; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .title { font-size: 32px; margin-bottom: 30px; }
        .title span { color: var(--blue); }

        /* ACADEMIA & CLASSES */
        .class-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .full { grid-column: span 2; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; margin: 15px 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .badge-info { background: rgba(59, 130, 246, 0.1); color: var(--blue); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        /* BOLSA & SOCIAL */
        #p-bolsa { font-size: 48px; font-family: 'Courier New', monospace; font-weight: bold; transition: 0.2s; }
        .chart-box { height: 350px; width: 100%; background: #020c1b; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .social-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .user-social-card { background: var(--bg-card); border-radius: 15px; padding: 20px; border: 1px solid #233554; text-align: center; }

        /* BOTONES */
        .btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; color: white; }
        .btn-buy { background: var(--green); }
        .btn-sell { background: transparent; border: 2px solid var(--red); color: var(--red); }
        .btn-blue { background: var(--blue); width: 100%; margin-top: 10px; }
        .btn-delete { background: var(--red); padding: 8px 15px; font-size: 12px; border: none; color: white; border-radius: 8px; cursor: pointer; }

        /* MEMES */
        .meme-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: var(--bg-card); padding: 25px; border: 3px solid var(--blue); border-radius: 25px; z-index: 1000; text-align: center; transition: 0.4s; box-shadow: 0 0 100px rgba(0,0,0,0.8); }
        .meme-popup.active { transform: translate(-50%, -50%) scale(1); }
        .meme-popup img { max-width: 280px; border-radius: 15px; }
        
        input, textarea { background: #020c1b; border: 1px solid #233554; color: white; padding: 12px; border-radius: 8px; font-size: 14px; width: 100%; }
    </style>
</head>
<body>

    <div id="meme-box" class="meme-popup">
        <img id="meme-img" src="" alt="Meme">
        <h3 id="meme-msg"></h3>
    </div>

    <nav>
        <div class="logo"><div class="logo-icon">M</div> MASARI</div>
        <button onclick="goto('inicio')" class="nav-btn active" id="n-inicio">Inicio</button>
        <button onclick="goto('comunidad')" class="nav-btn" id="n-comunidad">Comunidad</button>
        <button onclick="goto('academia')" class="nav-btn" id="n-academia">Academia</button>
        <button onclick="goto('bolsa')" class="nav-btn" id="n-bolsa">Mercado</button>
        <button onclick="goto('perfil')" class="nav-btn" id="n-perfil">Mi Perfil</button>
        <div style="margin-top: 40px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px;">
            <p style="color: var(--gray); font-size: 12px;">PROGRESO TOTAL</p>
            <p style="font-size: 20px; font-weight: bold; margin-top: 5px;">⭐ <span id="xp-display">2500</span> XP</p>
        </div>
    </nav>

    <main>
        <section id="inicio" class="page active">
            <h1 class="title">Bienvenido, <span id="display-name">Inversionista</span></h1>
            <div class="card" style="border-left: 6px solid var(--blue);">
                <h3>Panel Masari 🚀</h3>
                <p style="color: var(--gray);">Gestiona tus clases y tu capital en tiempo real.</p>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card"><h4>Cartera</h4><h2 id="ui-cartera" style="color: var(--green);">$0</h2></div>
                <div class="card"><h4>Acciones</h4><h2 id="ui-acciones">0</h2></div>
            </div>
        </section>

        <section id="comunidad" class="page">
            <h1 class="title">Comunidad <span>Masari</span></h1>
            <div class="social-grid" id="users-container">
                <div class="user-social-card">
                    <img id="my-social-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width:70px; border-radius:50%; border:2px solid var(--blue)">
                    <h3 id="my-social-name">Tú</h3>
                    <span class="badge-info">Miembro Activo</span>
                </div>
            </div>
        </section>

        <section id="academia" class="page">
            <h1 class="title">Academia <span>Pro</span></h1>
            <div class="card">
                <h3>Crear Nueva Clase 🎥</h3>
                <div class="class-form">
                    <input type="text" id="cl-title" placeholder="Título de la clase" class="full">
                    <input type="text" id="cl-url" placeholder="Link de YouTube">
                    <input type="number" id="cl-limit" placeholder="Límite de alumnos">
                    <textarea id="cl-desc" placeholder="Descripción de la clase" class="full"></textarea>
                    <textarea id="cl-prof" placeholder="Sobre el profesor" class="full"></textarea>
                    <button class="btn btn-buy full" onclick="saveClass()">PUBLICAR CLASE</button>
                </div>
            </div>
            <div id="classes-list"></div>
        </section>

        <section id="bolsa" class="page">
            <h1 class="title">Mercado <span>en Vivo</span></h1>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 id="p-bolsa" style="color: var(--green);">$800,000</h2>
                    <div>
                        <button class="btn btn-buy" onclick="trade(1)">COMPRAR</button>
                        <button class="btn btn-sell" onclick="trade(-1)">VENDER</button>
                    </div>
                </div>
                <div class="chart-box"><canvas id="graficaReal"></canvas></div>
            </div>
        </section>

        <section id="perfil" class="page">
            <h1 class="title">Mi <span>Perfil</span></h1>
            <div class="card">
                <input type="text" id="user-name" value="Inversionista Masari">
                <button class="btn btn-blue" style="margin-top:15px" onclick="saveP()">GUARDAR</button>
            </div>
        </section>
    </main>

    <script>
        let xp = 2500, price = 800000, stocks = 0;

        // --- ELIMINAR CLASE (CORREGIDO) ---
        function removeClass(button) {
            const card = button.closest('.card');
            if(card) {
                card.remove();
                meme(false, "Clase eliminada");
            }
        }

        // --- GUARDAR CLASE ---
        function saveClass() {
            const title = document.getElementById('cl-title').value;
            const url = document.getElementById('cl-url').value;
            const limit = document.getElementById('cl-limit').value;
            const desc = document.getElementById('cl-desc').value;
            const prof = document.getElementById('cl-prof').value;

            if(!title || !url || !limit) return alert("Faltan datos");

            let vId = url.includes("v=") ? url.split("v=")[1].split("&")[0] : (url.includes("be/") ? url.split("be/")[1] : "");
            
            const html = `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <h2 style="color:var(--blue)">${title}</h2>
                        <button class="btn-delete" onclick="removeClass(this)">BORRAR</button>
                    </div>
                    <p style="margin:10px 0; color:var(--gray)"><b>Profesor:</b> ${prof}</p>
                    <div class="video-container"><iframe src="https://www.youtube.com/embed/${vId}"></iframe></div>
                    <p>${desc}</p>
                    <div style="margin-top:15px; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                        <span>Inscritos: <b id="count">0</b> / ${limit}</span>
                        <button class="btn btn-buy" style="padding:5px 10px;" onclick="this.previousElementSibling.querySelector('b').innerText = parseInt(this.previousElementSibling.querySelector('b').innerText)+1; this.disabled=true; this.innerText='INSCRITO';">INSCRIBIRME</button>
                    </div>
                </div>
            `;
            document.getElementById('classes-list').insertAdjacentHTML('afterbegin', html);
            meme(true, "Clase subida");
        }

        // --- BOLSA ---
        const ctx = document.getElementById('graficaReal').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(30).fill(""), datasets: [{ data: Array(30).fill(800000), borderColor: '#3b82f6', tension: 0, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)' }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false }
        });
        setInterval(() => {
            let drift = (Math.random() - 0.48) * 14000; price += drift;
            document.getElementById('p-bolsa').innerText = "$" + Math.floor(price).toLocaleString();
            chart.data.datasets[0].data.push(price); chart.data.datasets[0].data.shift(); chart.update();
            updateUI();
        }, 1200);

        // --- FUNCIONES EXTRA ---
        function goto(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n-'+id).classList.add('active');
        }
        function trade(n) { if(n < 0 && stocks <= 0) return; stocks += n; updateUI(); }
        function updateUI() {
            document.getElementById('ui-cartera').innerText = "$" + Math.floor(stocks * price).toLocaleString();
            document.getElementById('ui-acciones').innerText = stocks;
            document.getElementById('xp-display').innerText = xp;
        }
        function saveP() { 
            const name = document.getElementById('user-name').value;
            document.getElementById('display-name').innerText = name;
            document.getElementById('my-social-name').innerText = name;
            alert("Guardado"); 
        }
        function meme(isWin, txt) {
            document.getElementById('meme-img').src = isWin ? "https://media.giphy.com/media/LdOyjZ7TC5K3LghXY8/giphy.gif" : "https://media.giphy.com/media/hStvd5LiWCFzXYZAzM/giphy.gif";
            document.getElementById('meme-msg').innerText = txt;
            document.getElementById('meme-box').classList.add('active');
            setTimeout(() => document.getElementById('meme-box').classList.remove('active'), 2000);
        }
    </script>
</body>
</html>
