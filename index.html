<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masari - Educación Financiera</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos rápidos para asegurar que se vea azul desde ya */
        :root { --azul: #0a192f; --brillante: #64ffda; --texto: #ccd6f6; }
        body { background-color: var(--azul); color: var(--texto); font-family: sans-serif; display: flex; margin: 0; }
        nav { width: 200px; height: 100vh; background: #112240; padding: 20px; border-right: 1px solid var(--brillante); position: fixed; }
        main { margin-left: 250px; padding: 40px; }
        .card { background: #112240; padding: 20px; border-radius: 10px; border: 1px solid rgba(100,255,218,0.2); margin-top: 20px; }
        .btn { background: var(--brillante); color: #0a192f; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <h1 style="color: var(--brillante)">MASARI</h1>
        <p>⭐ XP: <span id="xp-count">2500</span></p>
        <hr>
        <p>🏠 Inicio</p>
        <p>📚 Clases</p>
        <p>🤖 IA Ahorro</p>
        <p>📈 Bolsa</p>
    </nav>
    <main>
        <h1>Invierte inteligente, <span style="color: var(--brillante)">VIVE tranquilo</span></h1>
        <div class="card">
            <h3>Simulador de Bolsa ($MAS)</h3>
            <p style="font-size: 24px; color: #00ff88;">$800,450</p>
            <button class="btn" onclick="alert('¡Compra exitosa! +100 XP')">BUY</button>
        </div>
        <div class="card">
            <h3>IA de Ahorro 🤖</h3>
            <p>"Tu situación actual: Tienes buen flujo para invertir este mes."</p>
        </div>
    </main>
</body>
</html>
