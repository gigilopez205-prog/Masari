<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masari Fintech Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #f4f5f7; --bg-main: #faf9f6; --bg-card: #ffffff;
            --blue: #3b82f6; --blue-dark: #1d4ed8;
            --white: #111827; --gray: #6b7280;
            --green: #10b981; --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg-main); 
            color: var(--white); 
            display: flex; 
            min-height: 100vh; 
            font-family: 'Inter', sans-serif; /* Limpieza absoluta */
            -webkit-font-smoothing: antialiased;
        }

        /* SIDEBAR FINTECH */
        nav { width: 260px; background: var(--bg-dark); padding: 30px 20px; border-right: 1px solid #e5e7eb; position: fixed; height: 100vh; z-index: 100; }
        
        .logo { margin-bottom: 45px; display: flex; align-items: center; gap: 12px; font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 800; color: var(--blue); letter-spacing: -0.5px; }
        .logo img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--blue); box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); }

        .nav-btn { width: 100%; padding: 12px 16px; background: none; border: none; color: var(--gray); text-align: left; cursor: pointer; font-size: 14px; border-radius: 12px; margin-bottom: 6px; transition: 0.2s; font-weight: 600; }
        .nav-btn:hover { background: rgba(59, 130, 246, 0.05); color: var(--blue); }
        .nav-btn.active { background: var(--blue); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        /* CONTENT */
        main { margin-left: 260px; padding: 50px; width: calc(100% - 260px); }
        .page { display: none; max-width: 1000px; margin: 0 auto; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2, h3 { font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
        .title { font-size: 32px; margin-bottom: 35px; color: #111827; }
        .title span { color: var(--blue); }

        .card { background: var(--bg-card); padding: 28px; border-radius: 20px; border: 1px solid #f3f4f6; margin-bottom: 25px; box-shadow: 0 4px 25px rgba(0,0,0,0.03); }

        /* ACADEMIA GRID */
        .class-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .full { grid-column: span 2; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 16px; overflow: hidden; margin: 20px 0; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* BOLSA ESTATICA */
        #p-bolsa { font-size: 44px; font-weight: 800; font-family: 'Montserrat', sans-serif; letter-spacing: -1px; }
        .chart-box { height: 400px; width: 100%; background: #ffffff; border-radius: 20px; padding: 25px; border: 1px solid #f3f4f6; }

        /* FORMULARIOS FINTECH */
        input, textarea, select { background: #f9fafb; border: 1.5px solid #e5e7eb; color: var(--white); padding: 14px; border-radius: 12px; font-size: 14px; width: 100%; transition: 0.2s; outline: none; }
        input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        label { font-size: 12px; font-weight: 700; color: var(--gray); margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }

        /* BOTONES ACCIÓN */
        .btn { padding: 14px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .btn-buy { background: var(--green); color: white; }
        .btn-buy:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }
        .btn-sell { border: 2px solid var(--red); color: var(--red); background: transparent; }
        .btn-sell:hover { background: var(--red); color: white; }
        .btn-blue { background: var(--blue); color: white; width: 100%; font-size: 16px; }
        .btn-delete { background: #fee2e2; color: var(--red); font-size: 12px; padding: 8px 16px; border-radius: 8px; font-weight: 700; }
        .btn-delete:hover { background: var(--red); color: white; }

        .meme-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: white; padding: 35px; border-radius: 30px; z-index: 1000; text-align: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: none; box-shadow: 0 30px 60px rgba(0,0,0,0.2); }
        .meme-popup.active { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div id="meme-box" class="meme-popup">
        <img id="meme-img" src="" alt="Status" style="max-width:260px; border-radius:20px;">
        <h3 id="meme-msg" style="margin-top:20px;"></h3>
    </div>

    <nav>
        <div class="logo">
            <img src="uploaded:IMG_2353.jpeg-00f59935-b6de-41ed-bc9f-dc09f1346ac5" alt="Logo">
            MASARI
        </div>
        <button onclick="goto('inicio')" class="nav-btn active" id="n-inicio">Inicio</button>
        <button onclick="goto('academia')" class="nav-btn" id="n-academia">Academy</button>
        <button onclick="goto('bolsa')" class="nav-btn" id="n-bolsa">Markets</button>
        <button onclick="goto('comunidad')" class="nav-btn" id="n-comunidad">Network</button>
        <button onclick="goto('perfil')" class="nav-btn" id="n-perfil">Ajustes</button>
    </nav>

    <main>
        <section id="inicio" class="page active">
            <h1 class="title">Hola, <span id="display-name">Inversionista</span></h1>
            <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px;">
                <div class="card" style="background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; border: none;">
                    <h3 style="opacity: 0.9; font-size: 16px; margin-bottom: 10px;">Balance Total</h3>
                    <h1 id="ui-cartera" style="font-size: 42px;">$0</h1>
                    <p style="margin-top: 15px; font-size: 14px; opacity: 0.8;">Monitoreo de activos en tiempo real</p>
                </div>
                <div class="card">
                    <h3 style="color: var(--gray); font-size: 14px; margin-bottom: 10px;">Acciones Masari</h3>
                    <h2 id="ui-acciones" style="font-size: 32px;">0</h2>
                    <div style="margin-top: 10px; height: 4px; background: #eee; border-radius: 2px;">
                        <div style="width: 45%; height: 100%; background: var(--blue); border-radius: 2px;"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="academia" class="page">
            <h1 class="title">Masari <span>Academy</span></h1>
            <div class="card">
                <h3>Publicar Nuevo Módulo</h3>
                <div class="class-form">
                    <div class="full"><label>Título del Curso</label><input type="text" id="cl-title" placeholder="Ej. Estrategias de Scalping"></div>
                    <div><label>Video URL</label><input type="text" id="cl-url" placeholder="YouTube Link"></div>
                    <div><label>Cupo de Alumnos</label><input type="number" id="cl-limit" placeholder="Ej. 100"></div>
                    <div class="full"><label>Descripción del Curso</label><textarea id="cl-desc" placeholder="¿Qué aprenderán los alumnos?"></textarea></div>
                    <div class="full"><label>Perfil del Profesor</label><textarea id="cl-prof" placeholder="Trayectoria y experiencia"></textarea></div>
                    <button class="btn btn-blue full" onclick="saveClass()">LANZAR MÓDULO</button>
                </div>
            </div>
            <div id="classes-list"></div>
        </section>

        <section id="bolsa" class="page">
            <h1 class="title">Terminal de <span>Mercado</span></h1>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
                    <div>
                        <p style="color: var(--gray); font-weight: 700; font-size: 12px; text-transform: uppercase;">Precio Actual</p>
                        <h2 id="p-bolsa" style="color: var(--green);">$800,000</h2>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn btn-sell" onclick="trade(-1)">VENDER</button>
                        <button class="btn btn-buy" onclick="trade(1)">COMPRAR</button>
                    </div>
                </div>
                <div class="chart-box"><canvas id="graficaReal"></canvas></div>
            </div>
        </section>

        <section id="perfil" class="page">
            <h1 class="title">Configuración de <span>Cuenta</span></h1>
            <div class="card">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:25px;">
                    <div><label>Nombre Público</label><input type="text" id="user-name" value="Inversionista"></div>
                    <div><label>Fecha Nacimiento</label><input type="date"></div>
                    <div><label>País / Ciudad</label><input type="text" placeholder="Madrid, España"></div>
                    <div><label>Teléfono Móvil</label><input type="tel" placeholder="+34 000 000 000"></div>
                </div>
                <button class="btn btn-blue" style="margin-top:35px" onclick="saveP()">GUARDAR CAMBIOS</button>
            </div>
        </section>

        <section id="comunidad" class="page">
            <h1 class="title">Global <span>Network</span></h1>
            <div class="card" style="display: flex; align-items: center; gap: 20px;">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width:70px; border-radius:20px; background: #f3f4f6; padding: 10px;">
                <div>
                    <h3 id="my-social-name">Inversionista</h3>
                    <p style="color:var(--gray); font-size:14px; font-weight: 500;">Trading Score: 2,500 XP</p>
                </div>
                <button class="btn btn-buy" style="margin-left: auto; padding: 10px 20px;">VER PERFIL</button>
            </div>
        </section>
    </main>

    <script>
        let price = 800000, stocks = 0, lastPrice = 800000;

        // --- BOLSA FINTECH ---
        const ctx = document.getElementById('graficaReal').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: Array(30).fill(""), 
                datasets: [{ 
                    data: Array(30).fill(800000), 
                    borderColor: '#10b981', 
                    borderWidth: 4, 
                    tension: 0.4, 
                    fill: true, 
                    backgroundColor: (context) => {
                        const bg = context.chart.ctx.createLinearGradient(0, 0, 0, 400);
                        bg.addColorStop(0, 'rgba(16, 185, 129, 0.1)');
                        bg.addColorStop(1, 'rgba(16, 185, 129, 0)');
                        return bg;
                    },
                    pointRadius: 0 
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                animation: false,
                scales: { 
                    y: { grid: { display: false }, ticks: { font: { family: 'Inter', weight: 600 } } },
                    x: { grid: { display: false } }
                }
            }
        });

        setInterval(() => {
            lastPrice = price;
            price += (Math.random() - 0.485) * 15000;
            const color = price >= lastPrice ? '#10b981' : '#ef4444';
            document.getElementById('p-bolsa').innerText = "$" + Math.floor(price).toLocaleString();
            document.getElementById('p-bolsa').style.color = color;
            chart.data.datasets[0].borderColor = color;
            chart.data.datasets[0].data.push(price); chart.data.datasets[0].data.shift(); chart.update();
            updateUI();
        }, 1200);

        // --- ACADEMIA ---
        function saveClass() {
            const title = document.getElementById('cl-title').value;
            const url = document.getElementById('cl-url').value;
            const prof = document.getElementById('cl-prof').value;
            if(!title || !url) return alert("Completa los datos del módulo.");
            let vId = url.includes("v=") ? url.split("v=")[1].split("&")[0] : (url.includes("be/") ? url.split("be/")[1] : "");
            const html = `<div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <h3>${title}</h3>
                    <button class="btn-delete" onclick="this.closest('.card').remove()">ELIMINAR</button>
                </div>
                <p style="font-size:13px; color:var(--gray); margin-bottom:15px;"><b>Instructor:</b> ${prof}</p>
                <div class="video-container"><iframe src="https://www.youtube.com/embed/${vId}"></iframe></div>
                <button class="btn btn-blue" style="width:100%" onclick="this.innerText='INSCRITO'; this.style.background='#111827'; this.disabled=true;">INSCRIBIRME AL MÓDULO</button>
            </div>`;
            document.getElementById('classes-list').insertAdjacentHTML('afterbegin', html);
            meme(true, "Módulo Desplegado");
        }

        // --- UI CORE ---
        function goto(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n-'+id).classList.add('active');
        }
        function trade(n) { if(n < 0 && stocks <= 0) return; stocks += n; updateUI(); }
        function updateUI() {
            document.getElementById('ui-cartera').innerText = "$" + Math.floor(stocks * price).toLocaleString();
            document.getElementById('ui-acciones').innerText = stocks;
        }
        function saveP() { 
            const n = document.getElementById('user-name').value;
            document.getElementById('display-name').innerText = n;
            document.getElementById('my-social-name').innerText = n;
            meme(true, "Cambios Guardados");
        }
        function meme(win, txt) {
            document.getElementById('meme-img').src = win ? "https://media.giphy.com/media/LdOyjZ7TC5K3LghXY8/giphy.gif" : "https://media.giphy.com/media/hStvd5LiWCFzXYZAzM/giphy.gif";
            document.getElementById('meme-msg').innerText = txt;
            document.getElementById('meme-box').classList.add('active');
            setTimeout(() => document.getElementById('meme-box').classList.remove('active'), 2500);
        }
    </script>
</body>
</html>
