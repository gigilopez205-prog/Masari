<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masari Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="brand">MASARI</div>
        <div class="menu">
            <button onclick="cambiarPagina('inicio')" id="btn-inicio" class="nav-btn active"><i data-lucide="layout-grid"></i><span>Panel</span></button>
            <button onclick="cambiarPagina('clases')" id="btn-clases" class="nav-btn"><i data-lucide="graduation-cap"></i><span>Academia</span></button>
            <button onclick="cambiarPagina('juegos')" id="btn-juegos" class="nav-btn"><i data-lucide="line-chart"></i><span>Bolsa</span></button>
            <button onclick="cambiarPagina('perfil')" id="btn-perfil" class="nav-btn"><i data-lucide="user"></i><span>Perfil</span></button>
        </div>
        <div class="xp-footer">
            <div class="bar-bg"><div id="xp-bar-fill" class="bar-fill"></div></div>
            <p>⭐ <span id="xp-count">2500</span> XP</p>
        </div>
    </nav>

    <main class="content">
        <section id="inicio" class="page active">
            <h1 class="title">Tu <span>Capital</span></h1>
            <div class="card-grid">
                <div class="card">
                    <h4>Valor Cartera</h4>
                    <p id="balance-total" class="price-min">$0</p>
                </div>
                <div class="card">
                    <h4>Acciones</h4>
                    <p id="mis-acciones" class="price-min">0 unidades</p>
                </div>
            </div>
        </section>

        <section id="clases" class="page">
            <h2 class="title">Academia 📚</h2>
            <div id="quiz-container" class="card" style="display:none; border: 2px solid #3b82f6; background: #1a3060;">
                <h3 id="quiz-titulo">Cargando...</h3>
                <p id="quiz-pregunta" style="margin: 20px 0; font-size: 1.2rem;"></p>
                <div id="quiz-opciones" style="display:grid; gap:10px;"></div>
                <div id="quiz-feedback" style="display:none; margin-top:20px; padding:15px; background:rgba(0,0,0,0.3); border-radius:10px;">
                    <p id="feedback-texto"></p>
                    <button class="btn-main" onclick="cerrarQuiz()" style="margin-top:15px; background:#10b981;">Continuar</button>
                </div>
            </div>

            <div class="card-grid">
                <div class="card"><h3>Inflación</h3><button class="btn-main" onclick="abrirQuiz('inflacion')">Examen</button></div>
                <div class="card"><h3>ETFs</h3><button class="btn-main" onclick="abrirQuiz('etfs')">Examen</button></div>
                <div class="card"><h3>Cripto</h3><button class="btn-main" onclick="abrirQuiz('cripto')">Examen</button></div>
                <div class="card"><h3>Interés</h3><button class="btn-main" onclick="abrirQuiz('interes')">Examen</button></div>
            </div>
        </section>

        <section id="juegos" class="page">
            <h2 class="title">Simulador</h2>
            <div class="card">
                <div class="market-info">
                    <div id="p-bolsa" class="price-big" style="color:#10b981;">$800,000</div>
                    <div class="btns-trade">
                        <button class="btn-buy" onclick="comprarAccion()">COMPRAR</button>
                        <button class="btn-sell" onclick="venderAccion()">VENDER</button>
                    </div>
                </div>
                <div class="chart-box"><canvas id="graficaBolsa"></canvas></div>
            </div>
            <div class="card">
                <h3>Historial de Movimientos</h3>
                <div id="historial-bolsa" style="max-height: 200px; overflow-y: auto; margin-top:10px;">
                    <p style="color:gray;">Esperando transacciones...</p>
                </div>
            </div>
        </section>

        <section id="perfil" class="page">
            <h2 class="title">Progreso</h2>
            <div class="card">
                <div style="display:flex; justify-content: space-around;">
                    <div class="medalla" id="med-lobo">🐺<br><small>Trader</small></div>
                    <div class="medalla" id="med-genio">🧠<br><small>Sabio</small></div>
                    <div class="medalla" id="med-rico">💰<br><small>Rico</small></div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
