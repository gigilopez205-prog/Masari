<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masari Fintech Terminal Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: rgba(244, 245, 247, 0.9); 
            --bg-main: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.85);
            --blue: #3b82f6; --blue-dark: #1d4ed8;
            --white: #111827; --gray: #6b7280;
            --green: #10b981; --red: #ef4444;
        }

        /* FONDO INTERACTIVO REFORZADO */
        body { 
            margin: 0;
            background: #eef2f7;
            color: var(--white); 
            display: flex; 
            min-height: 100vh; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        #interactive-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, rgba(147, 197, 253, 0) 70%);
            border-radius: 50%;
            filter: blur(60px);
            transition: transform 0.2s ease-out; /* Para la interactividad con el mouse */
        }

        /* Animación automática para que siempre haya movimiento */
        @keyframes floating {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(1); }
        }

        /* SIDEBAR */
        nav { 
            width: 260px; 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 30px 20px; 
            border-right: 1px solid rgba(229, 231, 235, 0.5); 
            position: fixed; 
            height: 100vh; 
            z-index: 100; 
        }
        .logo { margin-bottom: 45px; display: flex; align-items: center; gap: 12px; font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 800; color: var(--blue); }
        .logo img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--blue); }

        .nav-btn { width: 100%; padding: 14px 18px; background: none; border: none; color: var(--gray); text-align: left; cursor: pointer; font-size: 14px; border-radius: 14px; margin-bottom: 8px; transition: 0.3s ease; font-weight: 600; }
        .nav-btn:hover { background: white; color: var(--blue); transform: translateX(8px); }
        .nav-btn.active { background: var(--blue); color: white; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3); }

        /* CONTENT */
        main { margin-left: 260px; padding: 50px; width: calc(100% - 260px); position: relative; }
        .page { display: none; max-width: 1100px; margin: 0 auto; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--bg-card); 
            backdrop-filter: blur(12px);
            padding: 30px; 
            border-radius: 28px; 
            border: 1px solid rgba(255, 255, 255, 0.7); 
            margin-bottom: 25px; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.03); 
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }

        .title { font-size: 34px; margin-bottom: 35px; color: #111827; }
        .title span { color: var(--blue); }

        /* BOLSA & GRAFICA */
        #p-bolsa { font-size: 52px; font-weight: 800; letter-spacing: -3px; }
        .chart-box { height: 350px; width: 100%; position: relative; }
        .history-list { overflow-y: auto; height: 200px; font-size: 13px; }

        .meme-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: white; padding: 40px; border-radius: 40px; z-index: 1000; text-align: center; transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 50px 120px rgba(0,0,0,0.3); }
        .meme-popup.active { transform: translate(-50%, -50%) scale(1); }

        .btn { padding: 15px 25px; border: none; border-radius: 16px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; width: 100%; }
        
        input, textarea, select { background: white; border: 2px solid #f1f5f9; padding: 15px; border-radius: 16px; width: 100%; }
    </style>
</head>
<body>

    <div id="interactive-bg">
        <div class="blob" id="blob1" style="top: -10%; left: -10%; animation: floating 15s infinite;"></div>
        <div class="blob" id="blob2" style="bottom: -10%; right: -10%; background: rgba(16, 185, 129, 0.1); animation: floating 20s infinite reverse;"></div>
    </div>

    <div id="meme-box" class="meme-popup">
        <img id="meme-img" src="" style="max-width:280px; border-radius:30px;">
        <h3 id="meme-msg" style="margin-top:25px;"></h3>
    </div>

    <nav>
        <div class="logo">
            <img src="uploaded:IMG_2353.jpeg-00f59935-b6de-41ed-bc9f-dc09f1346ac5" alt="Logo">
            MASARI
        </div>
        <button onclick="goto('inicio')" class="nav-btn active" id="n-inicio">Dashboard</button>
        <button onclick="goto('academia')" class="nav-btn" id="n-academia">Academia</button>
        <button onclick="goto('favoritos')" class="nav-btn" id="n-favoritos">Favoritos ❤️</button>
        <button onclick="goto('bolsa')" class="nav-btn" id="n-bolsa">Mercados</button>
        <button onclick="goto('comunidad')" class="nav-btn" id="n-comunidad">Comunidad</button>
        <button onclick="goto('perfil')" class="nav-btn" id="n-perfil">Mi Perfil</button>
    </nav>

    <main>
        <section id="inicio" class="page active">
            <h1 class="title">Bienvenido, <span id="display-name">Inversionista</span></h1>
            <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; margin-bottom: 25px;">
                <div class="card" style="background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; border: none;">
                    <p style="opacity: 0.8;">Balance Estimado</p>
                    <h1 id="ui-cartera" style="font-size: 46px; margin: 12px 0;">$0</h1>
                </div>
                <div class="card">
                    <p style="color: var(--gray);">Posiciones</p>
                    <h2 id="ui-acciones" style="font-size: 36px; margin: 12px 0;">0</h2>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
                <div class="card"><h3 style="font-size: 14px; color: var(--blue);">💡 FACT</h3><div id="fact-content" style="margin-top:10px; font-size:14px;">Cargando...</div></div>
                <div class="card"><h3 style="font-size: 14px; color: #f59e0b;">☕ TIP</h3><div id="meme-fact-content" style="margin-top:10px; font-size:14px; font-style:italic;">Cargando...</div></div>
            </div>
        </section>

        <section id="bolsa" class="page">
            <h1 class="title">Mercado <span>en Vivo</span></h1>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 id="p-bolsa" style="color: var(--green);">$800,000</h2>
                    <div>
                        <button class="btn" style="background:var(--red); color:white" onclick="trade(-1)">SELL</button>
                        <button class="btn" style="background:var(--green); color:white" onclick="trade(1)">BUY</button>
                    </div>
                </div>
                <div class="chart-box"><canvas id="graficaReal"></canvas></div>
            </div>
        </section>

        <section id="academia" class="page">
            <h1 class="title">Academia <span>Pro</span></h1>
            <div class="card">
                <h3>Nueva Clase</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                    <input type="text" id="cl-title" placeholder="Título" style="grid-column: span 2;">
                    <input type="text" id="cl-url" placeholder="YouTube URL">
                    <input type="number" id="cl-limit" placeholder="Cupo">
                    <button class="btn btn-blue" style="grid-column: span 2;" onclick="saveClass()">PUBLICAR</button>
                </div>
            </div>
            <div id="classes-list"></div>
        </section>

        <section id="favoritos" class="page"><h1 class="title">Favoritos ❤️</h1><div id="fav-list"></div></section>
        <section id="comunidad" class="page"><h1 class="title">Comunidad</h1><div class="card"><h3>Miembro Verificado</h3></div></section>
        <section id="perfil" class="page"><h1 class="title">Perfil</h1><div class="card"><input type="text" id="user-name" value="Inversionista"><button class="btn btn-blue" style="margin-top:10px" onclick="saveP()">GUARDAR</button></div></section>
    </main>

    <script>
        // --- INTERACTIVIDAD DEL FONDO ---
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 30;
            const y = (e.clientY / window.innerHeight) * 30;
            document.getElementById('blob1').style.transform = `translate(${x}px, ${y}px)`;
            document.getElementById('blob2').style.transform = `translate(${-x}px, ${-y}px)`;
        });

        // --- LÓGICA DE LA GRÁFICA ---
        let price = 800000, stocks = 0, chart;
        function initChart() {
            const ctx = document.getElementById('graficaReal').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(30).fill(""),
                    datasets: [{
                        data: Array(30).fill(800000),
                        borderColor: '#10b981',
                        borderWidth: 4,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        pointRadius: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { display: false } }, plugins: { legend: { display: false } } }
            });
        }

        setInterval(() => {
            let lastPrice = price;
            price += (Math.random() - 0.49) * 15000;
            const isUp = price >= lastPrice;
            document.getElementById('p-bolsa').innerText = "$" + Math.floor(price).toLocaleString();
            document.getElementById('p-bolsa').style.color = isUp ? 'var(--green)' : 'var(--red)';
            
            chart.data.datasets[0].borderColor = isUp ? '#10b981' : '#ef4444';
            chart.data.datasets[0].backgroundColor = isUp ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)';
            chart.data.datasets[0].data.push(price);
            chart.data.datasets[0].data.shift();
            chart.update('none');
            updateUI();
        }, 1000);

        // --- FUNCIONES GENERALES ---
        function goto(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n-'+id).classList.add('active');
        }

        function trade(n) { 
            if(n < 0 && stocks <= 0) return;
            stocks += n; updateUI(); 
            meme(true, n > 0 ? "¡Compra exitosa!" : "Venta completada");
        }

        function updateUI() {
            document.getElementById('ui-cartera').innerText = "$" + Math.floor(stocks * price).toLocaleString();
            document.getElementById('ui-acciones').innerText = stocks;
        }

        function saveP() { 
            document.getElementById('display-name').innerText = document.getElementById('user-name').value;
            meme(true, "Perfil Guardado");
        }

        function meme(win, txt) {
            document.getElementById('meme-img').src = win ? "https://media.giphy.com/media/LdOyjZ7TC5K3LghXY8/giphy.gif" : "https://media.giphy.com/media/hStvd5LiWCFzXYZAzM/giphy.gif";
            document.getElementById('meme-msg').innerText = txt;
            document.getElementById('meme-box').classList.add('active');
            setTimeout(() => document.getElementById('meme-box').classList.remove('active'), 2000);
        }

        const facts = ["El 90% de los traders fallan por falta de plan.", "Apple gana $3,000 por segundo.", "La paciencia paga más que el trading."];
        setInterval(() => {
            document.getElementById('fact-content').innerText = facts[Math.floor(Math.random()*facts.length)];
        }, 5000);

        window.onload = initChart;
    </script>
</body>
</html>
