<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masari - Educación Financiera</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">MASARI</div>
        <ul>
            <li><a href="#inicio">Página Inicial</a></li>
            <li><a href="#clases">Clases/Talleres</a></li>
            <li><a href="#ahorro">IA de Ahorro</a></li>
            <li><a href="#juegos">Juegos (Bolsa)</a></li>
        </ul>
        <div class="xp-badge">XP: 2500 ⭐</div>
    </nav>

    <main class="content">
        <section id="inicio" class="hero">
            <h1>Invierte inteligente, <span class="accent">VIVE tranquilo</span></h1>
            <div class="login-card">
                <h3>Iniciar Sesión</h3>
                <input type="text" placeholder="Usuario">
                <input type="password" placeholder="Contraseña">
                <button class="btn-main">Entrar</button>
            </div>
        </section>

        <section id="clases" class="grid-section">
            <h2>Clases Online y Talleres</h2>
            <div class="card-container">
                <div class="card">Video de Bienvenida</div>
                <div class="card">Fundamentos de Inversión</div>
            </div>
        </section>
    </main>

</body>
</html>
