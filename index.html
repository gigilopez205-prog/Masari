<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masari Ultimate</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="brand">MASARI</div>
        <div class="menu">
            <button onclick="cambiarPagina('inicio')" id="btn-inicio" class="nav-btn active"><i data-lucide="layout-grid"></i><span>Inicio</span></button>
            <button onclick="cambiarPagina('clases')" id="btn-clases" class="nav-btn"><i data-lucide="graduation-cap"></i><span>Academia</span></button>
            <button onclick="cambiarPagina('juegos')" id="btn-juegos" class="nav-btn"><i data-lucide="line-chart"></i><span>Bolsa</span></button>
            <button onclick="cambiarPagina('perfil')" id="btn-perfil" class="nav-btn"><i data-lucide="user"></i><span>Perfil</span></button>
        </div>
        <div class="xp-footer">
            <div class="bar-bg"><div id="xp-bar-fill" class="bar-fill"></div></div>
            <p>⭐ <span id="xp-count">2500</span> XP</p>
        </div>
    </nav>

    <main class="content">
        <section id="inicio" class="page active">
            <h1 class="title">Tu <span>Resumen</span></h1>
            <div class="card-grid">
                <div class="card">
                    <h4>Valor de Cartera</h4>
                    <p id="balance-total" class="price-min">$0</p>
                </div>
                <div class="card">
                    <h4>Acciones en Posesión</h4>
                    <p id="mis-acciones" class="price-min">0 unidades</p>
                </div>
            </div>
        </section>

        <section id="clases" class="page">
            <h2 class="title">Academia 📚</h2>
            <div id="quiz-container" class="card" style="display:none; border: 2px solid #3b82f6;">
                <h3 id="quiz-titulo">Examen</h3>
                <p id="quiz-pregunta" style="margin: 15px 0;"></p>
                <div id="quiz-opciones" style="display:flex; flex-direction:column; gap:10px;"></div>
            </div>
            <div class="card-grid">
                <div class="card">
                    <h3>Interés Compuesto</h3>
                    <button class="btn-main" onclick="abrirQuiz('interes')">Hacer examen +500 XP</button>
                </div>
                <div class="card">
                    <h3>Ahorro Real</h3>
                    <button class="btn-main" onclick="abrirQuiz('ahorro')">Hacer examen +500 XP</button>
                </div>
            </div>
        </section>

        <section id="juegos" class="page">
            <h2 class="title">Simulador 📈</h2>
            <div class="card market-card">
                <div class="market-info">
                    <div id="p-bolsa" class="price-big">$800,000</div>
                    <div class="btns-trade">
                        <button class="btn-buy" onclick="comprarAccion()">COMPRAR 1</button>
                        <button class="btn-sell" onclick="venderAccion()">VENDER TODO</button>
                    </div>
                </div>
                <div class="chart-box" style="height: 250px;"><canvas id="graficaBolsa"></canvas></div>
            </div>
        </section>

        <section id="perfil" class="page">
            <h2 class="title">Tus <span>Logros</span></h2>
            <div class="card">
                <div style="display:flex; gap:20px; justify-content: space-around;">
                    <div class="medalla" id="med-lobo">🐺<br><small>Inversionista</small></div>
                    <div class="medalla" id="med-genio">🧠<br><small>Sabio</small></div>
                    <div class="medalla" id="med-rico">💰<br><small>Millonario</small></div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
