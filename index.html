<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masari Fintech Terminal Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #10b981;
            --danger: #ef4444;
            --bg-deep: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: var(--bg-deep);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FONDO INTERACTIVO DE PARTÍCULAS */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        /* SIDEBAR FUTURISTA */
        nav {
            width: 280px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px 20px;
            border-right: 1px solid var(--glass-border);
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Montserrat';
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 2px;
            margin-bottom: 50px;
            color: var(--primary);
        }

        .logo img {
            width: 50px; height: 50px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            transition: 0.5s;
        }

        .nav-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background: transparent;
            border: 1px solid transparent;
            color: #94a3b8;
            text-align: left;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: var(--glass);
            border-color: var(--glass-border);
            color: white;
            transform: translateX(5px);
        }

        .nav-btn.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2), transparent);
            border-left: 4px solid var(--primary);
            color: white;
        }

        /* MAIN CONTENT */
        main {
            margin-left: 280px;
            padding: 60px;
            width: calc(100% - 280px);
        }

        .page {
            display: none;
            animation: fadeIn 0.6s ease-out;
        }

        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* CARDS GLASSMORPHISM 2.0 */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.1);
            transform: translateY(-5px) scale(1.01);
        }

        .title {
            font-size: 38px;
            margin-bottom: 40px;
            font-family: 'Montserrat';
        }

        .title span {
            background: linear-gradient(90deg, var(--primary), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* STATS */
        .stat-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 25px;
        }

        .balance-card {
            background: linear-gradient(135deg, #1e40af, #1e3a8a);
            position: relative;
            overflow: hidden;
        }

        .balance-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* BUTTONS */
        .btn {
            padding: 16px 28px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-buy { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-sell { background: var(--danger); color: white; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* CHART & HISTORY */
        .chart-container { height: 400px; width: 100%; margin-top: 20px; }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--glass-border);
            font-family: 'monospace';
        }

        /* MEME POPUP */
        .meme-popup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #1e293b;
            border: 2px solid var(--primary);
            padding: 40px;
            border-radius: 30px;
            z-index: 1000;
            text-align: center;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .meme-popup.active { transform: translate(-50%, -50%) scale(1); }

    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div id="meme-box" class="meme-popup">
        <img id="meme-img" src="" style="max-width:280px; border-radius:20px;">
        <h3 id="meme-msg" style="margin-top:20px; font-family: 'Montserrat';"></h3>
    </div>

    <nav>
        <div class="logo">
            <img src="uploaded:IMG_2353.jpeg-00f59935-b6de-41ed-bc9f-dc09f1346ac5" alt="Logo">
            MASARI
        </div>
        <button onclick="goto('inicio')" class="nav-btn active" id="n-inicio">DASHBOARD</button>
        <button onclick="goto('bolsa')" class="nav-btn" id="n-bolsa">MERCADOS</button>
        <button onclick="goto('academia')" class="nav-btn" id="n-academia">ACADEMIA</button>
        <button onclick="goto('favoritos')" class="nav-btn" id="n-favoritos">FAVORITOS ❤️</button>
        <button onclick="goto('perfil')" class="nav-btn" id="n-perfil">CONFIGURACIÓN</button>
    </nav>

    <main>
        <section id="inicio" class="page active">
            <h1 class="title">Terminal <span>Operativa</span></h1>
            <div class="stat-grid">
                <div class="card balance-card">
                    <p style="opacity: 0.7; position: relative; z-index: 1;">PATRIMONIO NETO</p>
                    <h1 id="ui-cartera" style="font-size: 55px; margin: 15px 0; position: relative; z-index: 1;">$0</h1>
                    <div style="font-size: 12px; opacity: 0.6; position: relative; z-index: 1;">ALGORITMO MASARI V6.2 ACTIVE</div>
                </div>
                <div class="card">
                    <p style="color: #94a3b8;">ACTIVOS EN HOLD</p>
                    <h2 id="ui-acciones" style="font-size: 40px; color: var(--primary);">0</h2>
                    <p style="font-size: 11px; color: var(--accent);">CONEXIÓN SEGURA SSL ●</p>
                </div>
            </div>

            <div class="card" style="border-left: 5px solid var(--primary);">
                <h3 style="margin-bottom: 15px;">Misión del Día</h3>
                <p id="fact-content" style="color: #cbd5e1; line-height: 1.6;">Sincronizando con los flujos de liquidez global...</p>
            </div>
        </section>

        <section id="bolsa" class="page">
            <h1 class="title">Live <span>Trading</span></h1>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <div>
                            <span style="font-size: 12px; color: #94a3b8;">PRECIO MASARI/USD</span>
                            <h2 id="p-bolsa" style="font-size: 48px; color: var(--accent);">$800,000</h2>
                        </div>
                        <div style="display: flex; gap: 15px;">
                            <button class="btn btn-sell" onclick="trade(-1)">Vender</button>
                            <button class="btn btn-buy" onclick="trade(1)">Comprar</button>
                        </div>
                    </div>
                    <div class="chart-container"><canvas id="graficaReal"></canvas></div>
                </div>
                <div class="card" style="padding: 20px;">
                    <h3 style="font-size: 16px; margin-bottom: 20px;">Libro de Órdenes</h3>
                    <div id="ticker-history" style="height: 350px; overflow-y: auto;"></div>
                </div>
            </div>
        </section>

        <section id="academia" class="page">
            <h1 class="title">Masari <span>Academy</span></h1>
            <div id="classes-list"></div>
        </section>

        <section id="perfil" class="page">
            <h1 class="title">Ajustes <span>Privados</span></h1>
            <div class="card">
                <label style="display: block; margin-bottom: 10px; color: #94a3b8;">NOMBRE DE OPERADOR</label>
                <input type="text" id="user-name" value="Inversionista" style="background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 15px; border-radius: 12px; color: white; width: 300px;">
                <button class="btn btn-buy" style="margin-top: 20px; width: auto;" onclick="saveP()">ACTUALIZAR CREDENCIALES</button>
            </div>
        </section>
    </main>

    <script>
        // --- MOTOR DE PARTÍCULAS ---
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(59, 130, 246, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- LÓGICA DE TRADING ---
        let price = 800000, stocks = 0, chart;

        function initChart() {
            const ctxChart = document.getElementById('graficaReal').getContext('2d');
            const grad = ctxChart.createLinearGradient(0, 0, 0, 400);
            grad.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
            grad.addColorStop(1, 'transparent');

            chart = new Chart(ctxChart, {
                type: 'line',
                data: {
                    labels: Array(40).fill(""),
                    datasets: [{
                        data: Array(40).fill(800000),
                        borderColor: '#3b82f6',
                        borderWidth: 4,
                        fill: true,
                        backgroundColor: grad,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { display: false }, x: { display: false } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        setInterval(() => {
            let last = price;
            price += (Math.random() - 0.485) * 15000;
            const isUp = price >= last;
            document.getElementById('p-bolsa').innerText = "$" + Math.floor(price).toLocaleString();
            document.getElementById('p-bolsa').style.color = isUp ? 'var(--accent)' : 'var(--danger)';
            
            chart.data.datasets[0].borderColor = isUp ? '#10b981' : '#ef4444';
            chart.data.datasets[0].data.push(price);
            chart.data.datasets[0].data.shift();
            chart.update('none');
            
            addHistory(price, isUp);
            updateUI();
        }, 1000);

        function addHistory(p, up) {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span style="color:#94a3b8">${new Date().toLocaleTimeString()}</span><b style="color:${up?'var(--accent)':'var(--danger)'}">${up?'▲':'▼'} $${Math.floor(p).toLocaleString()}</b>`;
            const container = document.getElementById('ticker-history');
            container.prepend(div);
            if(container.children.length > 10) container.removeChild(container.lastChild);
        }

        function trade(n) {
            if(n < 0 && stocks <= 0) {
                meme(false, "Saldos insuficientes para operar");
                return;
            }
            stocks += n;
            updateUI();
            meme(true, n > 0 ? "ORDEN DE COMPRA EJECUTADA" : "ORDEN DE VENTA EJECUTADA");
        }

        function updateUI() {
            document.getElementById('ui-cartera').innerText = "$" + Math.floor(stocks * price).toLocaleString();
            document.getElementById('ui-acciones').innerText = stocks;
        }

        function goto(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n-'+id).classList.add('active');
        }

        function meme(win, txt) {
            document.getElementById('meme-img').src = win ? "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJtZzZ5eXN6ZzZ5eXN6ZzZ5eXN6ZzZ5eXN6ZzZ5eXN6ZzZ5eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/LdOyjZ7TC5K3LghXY8/giphy.gif" : "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJtZzZ5eXN6ZzZ5eXN6ZzZ5eXN6ZzZ5eXN6ZzZ5eXN6ZzZ5eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/hStvd5LiWCFzXYZAzM/giphy.gif";
            document.getElementById('meme-msg').innerText = txt;
            document.getElementById('meme-box').classList.add('active');
            setTimeout(() => document.getElementById('meme-box').classList.remove('active'), 2500);
        }

        function saveP() {
            meme(true, "CREDENCIALES ACTUALIZADAS");
        }

        window.onload = initChart;

        const facts = ["Masari utiliza redes neuronales para predecir liquidez.", "El trading institucional domina el 80% del volumen.", "La disciplina supera al talento en los mercados.", "Bitcoin es el activo más escaso del mundo digital."];
        setInterval(() => {
            document.getElementById('fact-content').innerText = facts[Math.floor(Math.random()*facts.length)];
        }, 6000);

    </script>
</body>
</html>
