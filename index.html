<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masari Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="meme-container" class="meme-popup">
        <img id="meme-img" src="" alt="Meme">
        <p id="meme-msg"></p>
    </div>

    <nav class="sidebar">
        <div class="brand">MASARI</div>
        <div class="menu">
            <button onclick="cambiarPagina('inicio')" class="nav-btn active">Inicio</button>
            <button onclick="cambiarPagina('clases')" class="nav-btn">Academia</button>
            <button onclick="cambiarPagina('juegos')" class="nav-btn">Bolsa</button>
            <button onclick="cambiarPagina('perfil')" class="nav-btn">Perfil</button>
        </div>
        <div class="xp-footer">
            <div class="bar-bg"><div id="xp-bar-fill" class="bar-fill" style="width: 20%;"></div></div>
            <p>⭐ <span id="xp-count">2500</span> XP</p>
        </div>
    </nav>

    <main class="content">
        <section id="inicio" class="page active">
            <h1 class="title">Panel <span>Principal</span></h1>
            <div class="card">
                <h3>¿Qué es Masari?</h3>
                <p>Tu simulador financiero para aprender a invertir con memes y práctica real.</p>
            </div>
            <div class="card-grid">
                <div class="card"><h4>Cartera</h4><p id="balance-total">$0</p></div>
                <div class="card"><h4>Acciones</h4><p id="mis-acciones">0</p></div>
            </div>
        </section>

        <section id="clases" class="page">
            <h2 class="title">Maratón Quiz</h2>
            <div class="card" id="quiz-area">
                <div id="quiz-intro">
                    <button class="btn-main" onclick="iniciarMaraton()">¡EMPEZAR QUIZ!</button>
                </div>
                <div id="quiz-play" style="display:none;">
                    <h3 id="q-texto">Pregunta</h3>
                    <div id="q-opciones"></div>
                    <div id="q-feedback" style="display:none; margin-top:15px; color: #3b82f6;"></div>
                </div>
            </div>
        </section>

        <section id="juegos" class="page">
            <h2 class="title">Mercado en Vivo</h2>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 id="p-bolsa" style="font-size: 40px; color:#10b981;">$800,000</h2>
                    <div>
                        <button class="btn-buy" onclick="comprarAccion()">COMPRAR</button>
                        <button class="btn-sell" onclick="venderAccion()">VENDER</button>
                    </div>
                </div>
                <div style="height:300px; margin-top:20px;">
                    <canvas id="graficaBolsa"></canvas>
                </div>
            </div>
        </section>

        <section id="perfil" class="page">
            <h2 class="title">Logros</h2>
            <div class="card" style="display:flex; justify-content:space-around;">
                <div class="medalla" id="med-lobo">🐺<br>Trader</div>
                <div class="medalla" id="med-genio">🧠<br>Sabio</div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
