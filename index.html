<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masari Fintech Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #f4f5f7; --bg-main: #faf9f6; --bg-card: #ffffff;
            --blue: #3b82f6; --blue-dark: #1d4ed8;
            --white: #111827; --gray: #6b7280;
            --green: #10b981; --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-main); color: var(--white); display: flex; min-height: 100vh; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        /* SIDEBAR */
        nav { width: 260px; background: var(--bg-dark); padding: 30px 20px; border-right: 1px solid #e5e7eb; position: fixed; height: 100vh; z-index: 100; }
        .logo { margin-bottom: 45px; display: flex; align-items: center; gap: 12px; font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 800; color: var(--blue); }
        .logo img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--blue); }

        .nav-btn { width: 100%; padding: 12px 16px; background: none; border: none; color: var(--gray); text-align: left; cursor: pointer; font-size: 14px; border-radius: 12px; margin-bottom: 6px; transition: 0.2s; font-weight: 600; }
        .nav-btn:hover { background: rgba(59, 130, 246, 0.05); color: var(--blue); }
        .nav-btn.active { background: var(--blue); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        /* CONTENT */
        main { margin-left: 260px; padding: 50px; width: calc(100% - 260px); }
        .page { display: none; max-width: 1000px; margin: 0 auto; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2, h3 { font-family: 'Montserrat', sans-serif; font-weight: 700; }
        .title { font-size: 32px; margin-bottom: 35px; color: #111827; }
        .title span { color: var(--blue); }

        .card { background: var(--bg-card); padding: 28px; border-radius: 20px; border: 1px solid #f3f4f6; margin-bottom: 25px; box-shadow: 0 4px 25px rgba(0,0,0,0.03); position: relative; }

        /* ACADEMIA */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 16px; overflow: hidden; margin: 20px 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .fav-btn { position: absolute; top: 25px; right: 80px; background: #fef2f2; border: none; color: var(--red); padding: 10px; border-radius: 50%; cursor: pointer; transition: 0.3s; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .fav-btn:hover { transform: scale(1.1); background: var(--red); color: white; }

        /* BOTONES */
        .btn { padding: 14px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .btn-blue { background: var(--blue); color: white; width: 100%; }
        .btn-delete { background: #fee2e2; color: var(--red); font-size: 12px; padding: 8px 16px; border-radius: 8px; font-weight: 700; position: absolute; top: 25px; right: 25px; }

        /* BOLSA */
        #p-bolsa { font-size: 44px; font-weight: 800; }
        .chart-box { height: 400px; width: 100%; background: #ffffff; border-radius: 20px; padding: 25px; border: 1px solid #f3f4f6; }

        input, textarea { background: #f9fafb; border: 1.5px solid #e5e7eb; padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: 700; color: var(--gray); margin-bottom: 5px; display: block; text-transform: uppercase; }

        .meme-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: white; padding: 35px; border-radius: 30px; z-index: 1000; text-align: center; transition: 0.4s; box-shadow: 0 30px 60px rgba(0,0,0,0.2); }
        .meme-popup.active { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div id="meme-box" class="meme-popup">
        <img id="meme-img" src="" alt="Status" style="max-width:260px; border-radius:20px;">
        <h3 id="meme-msg" style="margin-top:20px;"></h3>
    </div>

    <nav>
        <div class="logo">
            <img src="uploaded:IMG_2353.jpeg-00f59935-b6de-41ed-bc9f-dc09f1346ac5" alt="Logo">
            MASARI
        </div>
        <button onclick="goto('inicio')" class="nav-btn active" id="n-inicio">Inicio</button>
        <button onclick="goto('academia')" class="nav-btn" id="n-academia">Cursos</button>
        <button onclick="goto('favoritos')" class="nav-btn" id="n-favoritos">Mis Favoritos ❤️</button>
        <button onclick="goto('bolsa')" class="nav-btn" id="n-bolsa">Mercado</button>
        <button onclick="goto('perfil')" class="nav-btn" id="n-perfil">Ajustes</button>
    </nav>

    <main>
        <section id="inicio" class="page active">
            <h1 class="title">Hola, <span id="display-name">Inversionista</span></h1>
            <div class="card" style="background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; border: none;">
                <h3 style="opacity: 0.9; font-size: 14px;">Capital en Gestión</h3>
                <h1 id="ui-cartera" style="font-size: 42px;">$0</h1>
            </div>
        </section>

        <section id="academia" class="page">
            <h1 class="title">Explorar <span>Cursos</span></h1>
            <div class="card">
                <h3>Añadir Nueva Lección</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                    <input type="text" id="cl-title" placeholder="Título">
                    <input type="text" id="cl-url" placeholder="YouTube URL">
                    <textarea id="cl-desc" placeholder="Descripción" style="grid-column: span 2;"></textarea>
                    <button class="btn btn-blue" style="grid-column: span 2;" onclick="saveClass()">PUBLICAR</button>
                </div>
            </div>
            <div id="classes-list"></div>
        </section>

        <section id="favoritos" class="page">
            <h1 class="title">Mis <span>Favoritos</span></h1>
            <div id="fav-list">
                <p style="color: var(--gray); text-align: center; margin-top: 40px;">Aún no has guardado ninguna clase favorita.</p>
            </div>
        </section>

        <section id="bolsa" class="page">
            <h1 class="title">Mercado <span>Live</span></h1>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
                    <h2 id="p-bolsa" style="color: var(--green);">$800,000</h2>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-blue" style="background:var(--red)" onclick="trade(-1)">SELL</button>
                        <button class="btn btn-blue" style="background:var(--green)" onclick="trade(1)">BUY</button>
                    </div>
                </div>
                <div class="chart-box"><canvas id="graficaReal"></canvas></div>
            </div>
        </section>

        <section id="perfil" class="page">
            <h1 class="title">Mi <span>Perfil</span></h1>
            <div class="card">
                <label>Nombre</label>
                <input type="text" id="user-name" value="Inversionista">
                <button class="btn btn-blue" style="margin-top: 20px;" onclick="saveP()">ACTUALIZAR</button>
            </div>
        </section>
    </main>

    <script>
        let price = 800000, stocks = 0;

        // --- LÓGICA DE FAVORITOS ---
        function toggleFav(btn) {
            const card = btn.closest('.card').cloneNode(true);
            const favList = document.getElementById('fav-list');
            
            // Limpiar mensaje de "vacío"
            if (favList.querySelector('p')) favList.innerHTML = '';

            // Quitar el botón de favorito de la copia para no duplicar infinitamente
            card.querySelector('.fav-btn').remove();
            
            // Añadir botón para quitar de favoritos
            const removeBtn = document.createElement('button');
            removeBtn.className = 'btn-delete';
            removeBtn.innerText = 'QUITAR';
            removeBtn.onclick = function() { this.closest('.card').remove(); };
            card.appendChild(removeBtn);

            favList.prepend(card);
            meme(true, "Añadido a favoritos ❤️");
        }

        // --- ACADEMIA ---
        function saveClass() {
            const title = document.getElementById('cl-title').value;
            const url = document.getElementById('cl-url').value;
            if(!title || !url) return alert("Faltan datos");
            let vId = url.includes("v=") ? url.split("v=")[1].split("&")[0] : (url.includes("be/") ? url.split("be/")[1] : "");
            
            const html = `
                <div class="card">
                    <button class="fav-btn" onclick="toggleFav(this)">❤️</button>
                    <button class="btn-delete" onclick="this.closest('.card').remove()">BORRAR</button>
                    <h3>${title}</h3>
                    <div class="video-container"><iframe src="https://www.youtube.com/embed/${vId}"></iframe></div>
                    <button class="btn btn-blue" onclick="this.innerText='INSCRITO';this.disabled=true;">INSCRIBIRME</button>
                </div>`;
            document.getElementById('classes-list').insertAdjacentHTML('afterbegin', html);
            meme(true, "Clase Publicada");
        }

        // --- BOLSA ---
        const ctx = document.getElementById('graficaReal').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(30).fill(""), datasets: [{ data: Array(30).fill(800000), borderColor: '#10b981', borderWidth: 3, tension: 0.4, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.05)', pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { grid: { display: false } }, x: { grid: { display: false } } } }
        });

        setInterval(() => {
            price += (Math.random() - 0.485) * 15000;
            document.getElementById('p-bolsa').innerText = "$" + Math.floor(price).toLocaleString();
            chart.data.datasets[0].data.push(price); chart.data.datasets[0].data.shift(); chart.update();
            updateUI();
        }, 1200);

        // --- NAVEGACIÓN ---
        function goto(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n-'+id).classList.add('active');
        }
        function trade(n) { if(n < 0 && stocks <= 0) return; stocks += n; updateUI(); }
        function updateUI() {
            document.getElementById('ui-cartera').innerText = "$" + Math.floor(stocks * price).toLocaleString();
        }
        function saveP() { 
            const n = document.getElementById('user-name').value;
            document.getElementById('display-name').innerText = n;
            meme(true, "Perfil Guardado");
        }
        function meme(win, txt) {
            document.getElementById('meme-img').src = win ? "https://media.giphy.com/media/LdOyjZ7TC5K3LghXY8/giphy.gif" : "https://media.giphy.com/media/hStvd5LiWCFzXYZAzM/giphy.gif";
            document.getElementById('meme-msg').innerText = txt;
            document.getElementById('meme-box').classList.add('active');
            setTimeout(() => document.getElementById('meme-box').classList.remove('active'), 2000);
        }
    </script>
</body>
</html>
